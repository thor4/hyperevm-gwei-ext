<!DOCTYPE html>
<html>
<head>
  <title>HyperEVM Gas Tracker</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
  <h1>HyperEVM Gas Prices</h1>
  <div id="gasPriceContainer">
    <table id="gasPriceTable">
      <tr>
        <th></th>
        <th>Normal</th>
        <th>Fast</th>
        <th>Instant</th>
      </tr>
      <tr>
        <td>GWEI</td>
        <td id="normalGwei">-</td>
        <td id="fastGwei">-</td>
        <td id="instantGwei">-</td>
        <td class="timestamp">50s ago</td>
      </tr>
      <tr id="usdCostRow">
        <td>USD</td>
        <td id="normalUsd">-</td>
        <td id="fastUsd">-</td>
        <td id="instantUsd">-</td>
      </tr>
    </table>
  </div>
  <div id="lastUpdated">Last updated: <span id="updateTime">-</span></div>
  <div id="hypePrice">HYPE Price: <span id="hypePriceValue">-</span> USD</div>
  <button id="refreshButton">Refresh</button>
  <script src="popup.js"></script>
</body>
</html>
